<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night24 Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #1c2129;
    --bg-hover: #21262d;
    --bg-input: #0d1117;
    --border-color: #30363d;
    --border-light: #21262d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-hover: #79b8ff;
    --accent-subtle: rgba(88, 166, 255, 0.15);
    --success: #3fb950;
    --warning: #d29922;
    --error: #f85149;
    --error-bg: rgba(248, 81, 73, 0.1);
    --user-bubble: #1f6feb;
    --assistant-bubble: #21262d;
    --tool-bg: #0d1117;
    --code-bg: #0d1117;
    --sidebar-width: 240px;
    --config-width: 280px;
    --font-mono: "SF Mono", Monaco, Consolas, "Liberation Mono", monospace;
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
    --transition-fast: 0.15s ease;
    --transition-normal: 0.2s ease;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
  }
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }
  .sidebar-header {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-header h2 { font-size: 14px; font-weight: 600; }
  .sidebar-header .logo {
    width: 28px; height: 28px; border-radius: 6px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 12px; color: white;
  }
  .new-session-btn {
    margin: 8px 12px 6px;
    padding: 8px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .new-session-btn:hover { background: var(--accent-hover); }
  .sessions-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .session-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 1px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .session-item:hover { background: var(--bg-hover); }
  .session-item.active { background: var(--bg-tertiary); border: 1px solid var(--border-color); }
  .session-item .session-title {
    flex: 1; font-size: 13px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .session-item .session-time {
    font-size: 10px; color: var(--text-muted); white-space: nowrap;
  }
  .session-item .delete-session {
    opacity: 0; background: none; border: none; color: var(--error);
    cursor: pointer; font-size: 14px; padding: 0 3px; transition: opacity 0.15s;
  }
  .session-item:hover .delete-session { opacity: 1; }
  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  .chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chat-header-left { display: flex; align-items: center; gap: 8px; }
  .mobile-menu-btn {
    display: none;
    background: none; border: none; color: var(--text-primary);
    font-size: 20px; cursor: pointer; padding: 4px;
  }
  .chat-title { font-size: 14px; font-weight: 600; }
  .chat-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .config-toggle {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .config-toggle:hover { background: var(--bg-hover); }
  .config-panel {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    padding: 12px 16px;
    display: none;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .config-panel.open { display: flex; }
  .config-group { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 140px; }
  .config-group label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .config-group input, .config-group select {
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .config-group input:focus, .config-group select:focus { border-color: var(--accent); }
  .config-group select { cursor: pointer; }

  /* Messages */
  .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .welcome {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    padding: 32px;
  }
  .message {
    display: flex;
    gap: 8px;
    max-width: 85%;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.assistant { align-self: flex-start; }
  .message-avatar {
    width: 28px; height: 28px; border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 11px;
  }
  .message.user .message-avatar { background: var(--user-bubble); color: white; }
  .message.assistant .message-avatar { background: var(--assistant-bubble); border: 1px solid var(--border-color); }
  .message-content {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .message-role { font-size: 10px; color: var(--text-muted); font-weight: 500; }
  .message.user .message-role { text-align: right; }
  .message-bubble {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .message.user .message-bubble {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: var(--space-1);
  }
  .message.assistant .message-bubble {
    background: var(--assistant-bubble);
    border: 1px solid var(--border-color);
    border-bottom-left-radius: var(--space-1);
  }
  .message-bubble p { margin-bottom: 6px; }
  .message-bubble p:last-child { margin-bottom: 0; }
  .message-bubble pre {
    background: var(--bg-primary);
    padding: 10px;
    border-radius: var(--radius-md);
    overflow-x: auto;
    font-size: var(--font-sm);
    border: 1px solid var(--border-color);
    margin: 6px 0;
  }
  .message-bubble code {
    background: var(--bg-primary);
    padding: 1px 4px;
    border-radius: var(--radius-sm);
    font-family: "SF Mono", Monaco, Consolas, monospace;
    font-size: var(--font-sm);
  }
  .tool-call {
    background: var(--tool-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    margin: 6px 0;
    font-size: var(--font-sm);
  }
  .tool-call-header {
    display: flex; align-items: center; gap: 4px;
    color: var(--warning); font-weight: 600; margin-bottom: 4px;
    font-size: var(--font-sm);
  }
  .tool-call-body {
    color: var(--text-secondary);
    font-family: "SF Mono", Monaco, Consolas, monospace;
    font-size: var(--font-xs);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .typing-indicator {
    display: flex; gap: var(--space-1); padding: 6px 0;
  }
  .typing-indicator span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    animation: typing 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border-color);
    background: var(--bg-secondary);
  }
  .input-wrapper {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }
  .input-wrapper textarea {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 10px 12px;
    border-radius: var(--radius-lg);
    font-size: var(--font-base);
    resize: none;
    outline: none;
    min-height: 36px;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .input-wrapper textarea:focus { border-color: var(--accent); }
  .send-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Error banner */
  .error-banner {
    background: var(--error-bg);
    border: 1px solid var(--error);
    color: var(--error);
    padding: 8px 12px;
    border-radius: var(--radius-md);
    margin: 6px 16px;
    font-size: var(--font-sm);
    display: none;
    align-items: center;
    gap: 6px;
  }
  .error-banner.show { display: flex; }
  .error-banner button {
    background: none; border: none; color: var(--error);
    cursor: pointer; font-size: 14px; margin-left: auto;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: var(--radius-sm); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-md); }
    .mobile-menu-btn { display: block; }
    .message { max-width: 95%; }
    .config-panel { flex-direction: column; }
    .config-group { min-width: 100%; }
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .overlay.show { display: block; }
  }
  @media (min-width: 769px) {
    .sidebar { transform: translateX(0) !important; }
  }

  .empty-state { text-align: center; padding: 32px 16px; color: var(--text-muted); }
</style>
  
  
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">N24</div>
      <h2>Sessions</h2>
    </div>
    <button class="new-session-btn" id="newSessionBtn">+ New Session</button>
    <div class="sessions-list" id="sessionsList"></div>

  </aside>

  <!-- Main chat area -->
  <main class="main">
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <div class="chat-title" id="chatTitle">Night24 Chat</div>
      </div>
      <div class="chat-controls">
        <button class="config-toggle" id="configToggle">⚙ Settings</button>
      </div>
    </div>

    <div class="config-panel" id="configPanel">
      <div class="config-group">
        <label for="providerSelect">Provider</label>
        <select id="providerSelect">
          <option value="echo">Echo</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="stepfun">StepFun</option>
          <option value="ollama">Ollama</option>
        </select>
      </div>
      <div class="config-group">
        <label for="modelInput">Model</label>
        <input type="text" id="modelInput" value="echo-v1" placeholder="e.g., gpt-4o-mini">
      </div>
      <div class="config-group">
        <label for="apiKeyInput">API Key</label>
        <input type="password" id="apiKeyInput" placeholder="Optional">
      </div>
      <div class="config-group">
        <label for="baseUrlInput">Base URL</label>
        <input type="text" id="baseUrlInput" placeholder="Optional override">
      </div>
    </div>

    <div class="error-banner" id="errorBanner">
      <span id="errorText"></span>
      <button id="closeError">×</button>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="welcome" id="welcomeScreen">
        <div>
          <h2 style="margin-bottom: 6px; font-size: 18px;">Welcome to Night24</h2>
          <p>Start a conversation by typing a message below, or select a session from the sidebar.</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>➤</button>
      </div>
    </div>
  </main>
</div>

<script>
(() => {
  const API_BASE = 'http://localhost:17787';
  const DOM = {
    sidebar: document.getElementById('sidebar'),
    overlay: document.getElementById('overlay'),
    mobileMenuBtn: document.getElementById('mobileMenuBtn'),
    sessionsList: document.getElementById('sessionsList'),
    newSessionBtn: document.getElementById('newSessionBtn'),

    configToggle: document.getElementById('configToggle'),
    configPanel: document.getElementById('configPanel'),
    providerSelect: document.getElementById('providerSelect'),
    modelInput: document.getElementById('modelInput'),
    apiKeyInput: document.getElementById('apiKeyInput'),
    baseUrlInput: document.getElementById('baseUrlInput'),
    messagesContainer: document.getElementById('messagesContainer'),
    welcomeScreen: document.getElementById('welcomeScreen'),
    messageInput: document.getElementById('messageInput'),
    sendBtn: document.getElementById('sendBtn'),
    errorBanner: document.getElementById('errorBanner'),
    errorText: document.getElementById('errorText'),
    closeError: document.getElementById('closeError'),
    chatTitle: document.getElementById('chatTitle'),
  };

  let currentSessionId = null;
  let sessions = [];
  let isStreaming = false;
  let abortController = null;

  // Auto-resize textarea
  DOM.messageInput.addEventListener('input', () => {
    DOM.messageInput.style.height = 'auto';
    DOM.messageInput.style.height = Math.min(DOM.messageInput.scrollHeight, 120) + 'px';
    DOM.sendBtn.disabled = !DOM.messageInput.value.trim() || isStreaming;
  });

  DOM.messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!DOM.sendBtn.disabled) sendMessage();
    }
  });

  DOM.sendBtn.addEventListener('click', sendMessage);

  DOM.closeError.addEventListener('click', () => hideError());
  DOM.configToggle.addEventListener('click', () => {
    DOM.configPanel.classList.toggle('open');
  });
  DOM.providerSelect.addEventListener('change', () => {
    const p = DOM.providerSelect.value;
    if (p === 'echo' && !DOM.modelInput.value) DOM.modelInput.value = 'echo-v1';
  });

  // Mobile sidebar
  DOM.mobileMenuBtn.addEventListener('click', () => {
    DOM.sidebar.classList.toggle('open');
    DOM.overlay.classList.toggle('show');
  });
  DOM.overlay.addEventListener('click', () => {
    DOM.sidebar.classList.remove('open');
    DOM.overlay.classList.remove('show');
  });

  DOM.newSessionBtn.addEventListener('click', createNewSession);

  function showError(msg) {
    DOM.errorText.textContent = msg;
    DOM.errorBanner.classList.add('show');
    setTimeout(() => hideError(), 8000);
  }
  function hideError() { DOM.errorBanner.classList.remove('show'); }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    return d.toLocaleDateString();
  }

  async function apiFetch(url, options = {}) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) {
        const text = await res.text().catch(() => 'Unknown error');
        throw new Error(`HTTP ${res.status}: ${text}`);
      }
      return res;
    } catch (e) {
      if (e.name === 'TypeError' && e.message.includes('fetch')) {
        throw new Error(`Cannot connect to server at ${API_BASE}. Is it running?`);
      }
      throw e;
    }
  }

  async function loadSessions() {
    try {
      const res = await apiFetch(`${API_BASE}/sessions`);
      sessions = await res.json();
      renderSessions();
    } catch (e) {
      console.error('Failed to load sessions:', e);
      showError(e.message);
    }
  }

  async function createNewSession() {
    try {
      const res = await apiFetch(`${API_BASE}/sessions`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
      const session = await res.json();
      sessions.unshift(session);
      renderSessions();
      selectSession(session.id);
      if (window.innerWidth <= 768) {
        DOM.sidebar.classList.remove('open');
        DOM.overlay.classList.remove('show');
      }
    } catch (e) {
      showError('Failed to create session: ' + e.message);
    }
  }

  async function deleteSession(id, e) {
    e.stopPropagation();
    if (!confirm('Delete this session?')) return;
    try {
      await apiFetch(`${API_BASE}/sessions/${id}`, { method: 'DELETE' });
      sessions = sessions.filter(s => s.id !== id);
      if (currentSessionId === id) {
        currentSessionId = null;
        clearMessages();
      }
      renderSessions();
    } catch (e) {
      showError('Failed to delete session: ' + e.message);
    }
  }

  async function loadSessionHistory(id) {
    try {
      const res = await apiFetch(`${API_BASE}/sessions/${id}/history`);
      const history = await res.json();
      currentSessionId = id;
      renderMessages(history);
      renderSessions();
      if (window.innerWidth <= 768) {
        DOM.sidebar.classList.remove('open');
        DOM.overlay.classList.remove('show');
      }
    } catch (e) {
      showError('Failed to load session history: ' + e.message);
    }
  }

  function selectSession(id) { loadSessionHistory(id); }

  function renderSessions() {
    DOM.sessionsList.innerHTML = '';
    if (sessions.length === 0) {
      DOM.sessionsList.innerHTML = '<div class="empty-state">No sessions yet</div>';
      return;
    }
    sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      const title = s.title || s.id.slice(0, 8) || 'New session';
      div.innerHTML = `
        <div class="session-title" title="${title}">${title}</div>
        <div class="session-time">${formatTime(s.updated_at || s.created_at)}</div>
        <button class="delete-session" title="Delete">×</button>
      `;
      div.addEventListener('click', () => selectSession(s.id));
      div.querySelector('.delete-session').addEventListener('click', (e) => deleteSession(s.id, e));
      DOM.sessionsList.appendChild(div);
    });
  }

  function clearMessages() {
    DOM.messagesContainer.innerHTML = '';
    DOM.messagesContainer.appendChild(DOM.welcomeScreen);
    DOM.welcomeScreen.style.display = 'flex';
    DOM.chatTitle.textContent = 'Night24 Chat';
  }

  function renderMessages(messages) {
    DOM.messagesContainer.innerHTML = '';
    if (!messages || messages.length === 0) {
      DOM.messagesContainer.appendChild(DOM.welcomeScreen);
      DOM.welcomeScreen.style.display = 'flex';
      DOM.chatTitle.textContent = 'Night24 Chat';
      return;
    }
    DOM.welcomeScreen.style.display = 'none';
    const session = sessions.find(s => s.id === currentSessionId);
    DOM.chatTitle.textContent = session ? (session.title || 'Session') : 'Night24 Chat';
    messages.forEach(msg => appendMessageToDOM(msg, false));
    scrollToBottom();
  }

  function appendMessageToDOM(msg, animate = true) {
    if (DOM.welcomeScreen.style.display !== 'none') {
      DOM.welcomeScreen.style.display = 'none';
      DOM.messagesContainer.removeChild(DOM.welcomeScreen);
    }
    const div = document.createElement('div');
    div.className = `message ${msg.role}`;
    if (!animate) div.style.animation = 'none';

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = msg.role === 'user' ? 'U' : (msg.role === 'tool' ? 'T' : 'AI');

    const content = document.createElement('div');
    content.className = 'message-content';

    const roleLabel = document.createElement('div');
    roleLabel.className = 'message-role';
    roleLabel.textContent = msg.role === 'user' ? 'You' : (msg.role === 'tool' ? 'Tool' : 'Assistant');
    content.appendChild(roleLabel);

    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';

    if (Array.isArray(msg.content)) {
      msg.content.forEach(block => {
        if (block.type === 'text') {
          const p = document.createElement('p');
          p.innerHTML = formatText(block.text || '');
          bubble.appendChild(p);
        } else if (block.type === 'tool_request') {
          const toolEl = document.createElement('div');
          toolEl.className = 'tool-call';
          toolEl.innerHTML = `<div class="tool-call-header">🔧 Tool: ${escapeHtml(block.name || 'unknown')}</div><div class="tool-call-body">${escapeHtml(typeof block.arguments === 'string' ? block.arguments : JSON.stringify(block.arguments, null, 2))}</div>`;
          bubble.appendChild(toolEl);
        } else if (block.type === 'tool_response') {
          const toolEl = document.createElement('div');
          toolEl.className = 'tool-call';
          toolEl.innerHTML = `<div class="tool-call-header">📤 Tool Result: ${escapeHtml(block.id || 'unknown')}</div><div class="tool-call-body">${escapeHtml(typeof block.content === 'string' ? block.content : JSON.stringify(block.content, null, 2))}</div>`;
          bubble.appendChild(toolEl);
        } else if (block.type === 'thinking') {
          const p = document.createElement('p');
          p.style.color = 'var(--text-muted)';
          p.style.fontStyle = 'italic';
          p.textContent = block.text || '';
          bubble.appendChild(p);
        }
      });
    } else if (typeof msg.content === 'string') {
      const p = document.createElement('p');
      p.innerHTML = formatText(msg.content);
      bubble.appendChild(p);
    }

    content.appendChild(bubble);
    div.appendChild(avatar);
    div.appendChild(content);
    DOM.messagesContainer.appendChild(div);
    return bubble;
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatText(text) {
    if (!text) return '';
    let html = escapeHtml(text);
    // Code blocks
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      return `<pre><code>${code.trim()}</code></pre>`;
    });
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    // Line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      DOM.messagesContainer.scrollTop = DOM.messagesContainer.scrollHeight;
    });
  }

  function showTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="message-avatar">AI</div>
      <div class="message-content">
        <div class="message-role">Assistant</div>
        <div class="message-bubble">
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      </div>
    `;
    DOM.messagesContainer.appendChild(div);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = DOM.messageInput.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    DOM.sendBtn.disabled = true;
    DOM.messageInput.value = '';
    DOM.messageInput.style.height = 'auto';
    hideError();

    const provider = DOM.providerSelect.value;
    const model = DOM.modelInput.value.trim() || (provider === 'echo' ? 'echo-v1' : '');
    const apiKey = DOM.apiKeyInput.value.trim();
    const baseUrl = DOM.baseUrlInput.value.trim();

    // Add user message
    const userMsg = { role: 'user', content: [{ type: 'text', text }] };
    appendMessageToDOM(userMsg);
    scrollToBottom();

    // Ensure session exists
    let sessionId = currentSessionId;
    if (!sessionId) {
      try {
        const session = await apiPost('/sessions', {});
        sessionId = session.id;
        currentSessionId = sessionId;
        sessions.unshift(session);
        renderSessions();
      } catch (e) {
        showError('Failed to create session: ' + e.message);
        isStreaming = false;
        DOM.sendBtn.disabled = false;
        return;
      }
    }

    showTypingIndicator();

    try {
      abortController = new AbortController();
      const body = {
        session_id: sessionId,
        text: text,
        provider,
        model,
      };
      if (apiKey) body.api_key = apiKey;
      if (baseUrl) body.base_url = baseUrl;

      const response = await fetch(`${API_BASE}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: abortController.signal,
      });

      if (!response.ok) {
        const errText = await response.text().catch(() => 'Unknown error');
        throw new Error(`HTTP ${response.status}: ${errText}`);
      }

      removeTypingIndicator();

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const data = line.slice(5).trim();

          try {
            const msg = JSON.parse(data);
            appendMessageToDOM(msg);
            scrollToBottom();
          } catch (e) {
            // Ignore partial JSON
          }
        }
      }
    } catch (e) {
      removeTypingIndicator();
      if (e.name === 'AbortError') {
        showError('Request cancelled');
      } else {
        showError(e.message);
      }
    } finally {
      isStreaming = false;
      abortController = null;
      DOM.sendBtn.disabled = !DOM.messageInput.value.trim();
      loadSessions();
    }
  }

  // Init
  loadSessions();
  DOM.messageInput.focus();
})();
</script>
</body>
</html>
